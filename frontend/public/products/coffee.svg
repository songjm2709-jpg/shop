<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="bag2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="24"/>
  <!-- 커피 봉투 몸통 -->
  <path d="M 145,120 L 148,290 Q 148,305 160,308 L 240,308 Q 252,305 252,290 L 255,120 Z" fill="url(#bag)"/>
  <!-- 봉투 상단 접힘 -->
  <path d="M 145,120 Q 160,108 200,108 Q 240,108 255,120 L 248,148 Q 234,138 200,138 Q 166,138 152,148 Z" fill="url(#bag2)"/>
  <!-- 봉투 봉인 클립 -->
  <rect x="178" y="108" width="44" height="12" rx="6" fill="#fbbf24"/>
  <!-- 커피 원두 로고 -->
  <circle cx="200" cy="210" r="38" fill="#fbbf24" opacity="0.2"/>
  <circle cx="200" cy="210" r="28" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  <ellipse cx="200" cy="210" rx="10" ry="18" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <line x1="200" y1="192" x2="200" y2="228" stroke="#fbbf24" stroke-width="2"/>
  <!-- 텍스트 라벨 -->
  <rect x="158" y="238" width="84" height="20" rx="4" fill="#fbbf24" opacity="0.3"/>
  <text x="200" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fef3c7" font-weight="600">ORGANIC</text>
  <!-- 봉투 하이라이트 -->
  <path d="M 158,128 L 156,280" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#92400e" opacity="0.9">유기농 커피</text>
</svg>
