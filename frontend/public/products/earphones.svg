<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="bud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="24"/>
  <!-- 왼쪽 이어버드 케이스 -->
  <ellipse cx="140" cy="200" rx="48" ry="58" fill="url(#bud)" stroke="#7dd3fc" stroke-width="2"/>
  <ellipse cx="140" cy="200" rx="28" ry="36" fill="#bae6fd" opacity="0.6"/>
  <ellipse cx="140" cy="200" rx="12" ry="16" fill="#38bdf8"/>
  <!-- 오른쪽 이어버드 케이스 -->
  <ellipse cx="260" cy="200" rx="48" ry="58" fill="url(#bud)" stroke="#7dd3fc" stroke-width="2"/>
  <ellipse cx="260" cy="200" rx="28" ry="36" fill="#bae6fd" opacity="0.6"/>
  <ellipse cx="260" cy="200" rx="12" ry="16" fill="#38bdf8"/>
  <!-- 충전 케이스 힌지 -->
  <rect x="176" y="194" width="48" height="12" rx="6" fill="#7dd3fc" opacity="0.5"/>
  <!-- 하이라이트 -->
  <ellipse cx="128" cy="182" rx="8" ry="5" fill="white" opacity="0.6"/>
  <ellipse cx="248" cy="182" rx="8" ry="5" fill="white" opacity="0.6"/>
  <!-- 상품명 -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#0369a1" opacity="0.8">무선 이어폰</text>
</svg>
