<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CCFBF1"/>
      <stop offset="100%" stop-color="#99F6E4"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="40%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="24"/>
  <!-- 텀블러 몸통 -->
  <path d="M 158,150 L 152,295 Q 152,310 168,312 L 232,312 Q 248,310 248,295 L 242,150 Z" fill="url(#body)"/>
  <!-- 뚜껑 -->
  <rect x="155" y="128" width="90" height="26" rx="8" fill="url(#lid)"/>
  <!-- 뚜껑 상단 버튼 -->
  <rect x="185" y="112" width="30" height="20" rx="8" fill="#0d9488"/>
  <circle cx="200" cy="120" r="5" fill="#5eead4"/>
  <!-- 손잡이 링 -->
  <path d="M 245,160 Q 268,160 268,180 Q 268,200 245,200" fill="none" stroke="#0d9488" stroke-width="8" stroke-linecap="round"/>
  <!-- 텀블러 줄무늬 (디자인) -->
  <rect x="155" y="175" width="88" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <rect x="155" y="195" width="88" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <!-- 로고 영역 -->
  <ellipse cx="200" cy="240" rx="26" ry="18" fill="white" opacity="0.15"/>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="700" opacity="0.8">500ml</text>
  <!-- 하이라이트 -->
  <path d="M 165,155 L 163,295" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#0f766e" opacity="0.9">텀블러</text>
</svg>
